stages:
  - lint
  - metagen
  - generate
  - build
  - publish

variables:
  PUBLISH_VERSION: "latest"
  GIT_DEPTH: "0"

.gpg_setup: &gpg_setup
  - |
    if [ -n "$GPG_PRIVATE_KEY" ]; then
      mkdir -p .gnupg; export GNUPGHOME="$(pwd)/.gnupg"; chmod 700 .gnupg
      echo "allow-loopback-pinentry" > .gnupg/gpg-agent.conf
      echo "pinentry-mode loopback" > .gnupg/gpg.conf
      echo "$GPG_PRIVATE_KEY" | base32 -d | gpg --batch --pinentry-mode loopback --import
      gpgconf --kill gpg-agent
      GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d: -f5 | head -n 1)
      echo "Imported GPG Key: $GPG_KEY_ID"
      echo "$GPG_KEY_ID" > gpg_key_id.txt
      if [ -n "$GPG_PASSWORD" ]; then
        GPG_PASS=$(echo "$GPG_PASSWORD" | base32 -d)
        KEYGRIP=$(gpg --list-secret-keys --with-keygrip --with-colons "$GPG_KEY_ID" | grep '^grp' | cut -d: -f10 | head -n 1)
        if [ -n "$KEYGRIP" ]; then
          echo "PRESET_PASSPHRASE $KEYGRIP -1 $(echo -n "$GPG_PASS" | xxd -p)" | gpg-connect-agent --no-tty /bye 2>/dev/null || true
        fi
      fi
    fi

.common_before_script: &common_before_script
  - curl -fsSL https://zillowe.pages.dev/scripts/zoi/install.sh | bash
  - export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
  - zoi sync
  - *gpg_setup

.detect_changes: &detect_changes
  - |
    if [ "$CI_COMMIT_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
      CHANGED_FILES=$(find . -name "*.pkg.lua" -not -path "*/.*")
    else
      CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA | grep "\.pkg\.lua$" || true)
    fi
    echo "Changed packages: $CHANGED_FILES"

registry-audit:
  stage: lint
  image: archlinux:latest
  before_script:
    - pacman -Syu --noconfirm curl git bash gnupg coreutils
    - *common_before_script
  script:
    - zoi reg check

metadata-generation:
  stage: metagen
  image: archlinux:latest
  rules:
    - if: "$CI_COMMIT_MESSAGE !~ /security: update metadata index/"
  before_script:
    - pacman -Syu --noconfirm curl git bash gnupg coreutils
    - *common_before_script
  script:
    - |
      if [ -n "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" ]; then
        TARGET_BRANCH=$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
      else
        TARGET_BRANCH=$CI_COMMIT_BRANCH
      fi
      git config --global user.email "contact@zillowe.qzz.io"
      git config --global user.name "ZSA Registrar Bot"
      if [ -n "$GPG_PRIVATE_KEY" ]; then
        mkdir -p ~/.gnupg; chmod 700 ~/.gnupg
        echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
        echo "$GPG_PRIVATE_KEY" | base32 -d | gpg --batch --import
        gpgconf --kill gpg-agent
        GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d: -f5 | head -n 1)
        if [ -n "$GPG_KEY_ID" ]; then git config --global user.signingkey "$GPG_KEY_ID"; fi
        if [ -n "$GPG_PASSWORD" ]; then
          GPG_PASS=$(echo "$GPG_PASSWORD" | base32 -d); export GPG_PASS
          printf '#!/bin/sh\nexec gpg --batch --passphrase "$GPG_PASS" --pinentry-mode loopback "$@"\n' > /tmp/git-gpg-wrapper
          chmod +x /tmp/git-gpg-wrapper
          git config --global gpg.program /tmp/git-gpg-wrapper
        fi
      fi
      git remote set-url origin "https://oauth2:${PROJECT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git fetch origin refs/heads/$TARGET_BRANCH
      git checkout -B $TARGET_BRANCH origin/$TARGET_BRANCH
      zoi reg gen-meta
      if [ -n "$(git status --porcelain)" ]; then
        git add .
        git commit -S -m "security: update metadata index [skip ci]"
        git push origin HEAD:$TARGET_BRANCH
      fi

# ── Generate child pipeline (one job per package, all platforms) ──

generate-child:
  stage: generate
  image: archlinux:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - pacman -Syu --noconfirm curl git bash coreutils awk jq
    - *common_before_script
  script:
    - *detect_changes
    - |
      if [ -z "$CHANGED_FILES" ]; then
        echo "No packages changed."
        mkdir -p generated
        printf '%s\n' \
          "stages:" \
          "  - build" \
          "" \
          "noop:" \
          "  stage: build" \
          '  script: echo "No packages changed, nothing to build"' \
          "" > generated/child.yml
        exit 0
      fi

      mkdir -p generated

      # Write child pipeline header
      printf '%s\n' \
        "stages:" \
        "  - build" \
        "" \
        "variables:" \
        '  PUBLISH_VERSION: "latest"' \
        "  GIT_DEPTH: \"0\"" \
        "" > generated/child.yml

      for PKG_FILE in $CHANGED_FILES; do
        if [ ! -f "$PKG_FILE" ]; then continue; fi

        PKG_JSON=$(zoi package inspect "$PKG_FILE" --json)
        PLATFORMS=$(echo "$PKG_JSON" | jq -r '.platforms // [] | .[]')
        PKG_BASENAME=$(basename "$PKG_FILE" .pkg.lua)
        PKG_ID=$(echo "$PKG_FILE" | tr '/' '-' | sed 's/\.pkg\.lua$//')
        ESCAPED_FILE=$(echo "$PKG_FILE" | sed 's/\./\\./g; s/\//\\\//g')

        # ── Linux target ──
        LINUX_TARGETS=""
        if [ -z "$PLATFORMS" ]; then
          LINUX_TARGETS="linux-amd64 linux-arm64"
        else
          for PLATFORM in $PLATFORMS; do
            case "$PLATFORM" in
              ci:*) T="${PLATFORM#ci:}"; T="${T%%:*}"; R="${PLATFORM##*:}"
                    if [ "$R" = "linux" ]; then LINUX_TARGETS="$LINUX_TARGETS $T"; fi ;;
              linux|linux-*) LINUX_TARGETS="$LINUX_TARGETS $PLATFORM" ;;
            esac
          done
        fi
        if [ -n "$LINUX_TARGETS" ]; then
          printf '%s\n' \
            "build-linux-$PKG_ID:" \
            "  stage: build" \
            "  image: archlinux:latest" \
            "  tags:" \
            "    - saas-linux-small-amd64" \
            "  variables:" \
            "    PKG_FILE: \"$PKG_FILE\"" \
            "    TARGETS: \"$LINUX_TARGETS\"" \
            "  before_script:" \
            "    - pacman -Syu --noconfirm curl git bash gnupg zstd coreutils jq" \
            "    - curl -fsSL https://zillowe.pages.dev/scripts/zoi/install.sh | bash" \
            '    - export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"' \
            "    - zoi sync" \
            '    - if [ -n "$GPG_PRIVATE_KEY" ]; then mkdir -p .gnupg; export GNUPGHOME="$(pwd)/.gnupg"; chmod 700 .gnupg; echo "allow-loopback-pinentry" > .gnupg/gpg-agent.conf; echo "pinentry-mode loopback" > .gnupg/gpg.conf; echo "$GPG_PRIVATE_KEY" | base32 -d | gpg --batch --pinentry-mode loopback --import; gpgconf --kill gpg-agent; GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep "^sec" | cut -d: -f5 | head -n 1); echo "$GPG_KEY_ID" > gpg_key_id.txt; fi' \
            "  script:" \
            "    - |" \
            '      mkdir -p built_packages' \
            '      GPG_KEY_ID=$(cat gpg_key_id.txt 2>/dev/null || echo "")' \
            '      SIGN_ARG=""; [ -n "$GPG_KEY_ID" ] && SIGN_ARG="--sign $GPG_KEY_ID"' \
            '      for TARGET in $TARGETS; do' \
            '        echo "Building $PKG_FILE for $TARGET..."' \
            '        zoi package build "$PKG_FILE" --install-deps --platform "$TARGET" --method native -o built_packages $SIGN_ARG' \
            '      done' \
            '      echo "Bundling .zsa for $PKG_FILE..."' \
            '      zoi package bundle "$PKG_FILE" -o built_packages' \
            '      PKG_JSON=$(zoi package inspect "$PKG_FILE" --json)' \
            '      PKG_NAME=$(echo "$PKG_JSON" | jq -r ".name")' \
            '      PKG_REPO=$(echo "$PKG_JSON" | jq -r ".repo")' \
            '      if [ -z "$PKG_REPO" ] || [ "$PKG_REPO" = "null" ]; then PKG_ID_UPLOAD="$PKG_NAME"; else PKG_ID_UPLOAD="$(echo "$PKG_REPO" | tr "/" ".").$PKG_NAME"; fi' \
            '      find built_packages -name "${PKG_NAME}-*" -type f | while read -r FILE; do FILENAME=$(basename "$FILE"); echo "Uploading $FILENAME to latest-tmp..."; curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "$FILE" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_ID_UPLOAD}/latest-tmp/${FILENAME}"; done' \
            '      PACKAGE_IDS=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=${PKG_ID_UPLOAD}&package_type=generic" | jq -r ".[].id")' \
            '      for ID in $PACKAGE_IDS; do if [ -n "$ID" ] && [ "$ID" != "null" ]; then VERSION=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}" | jq -r ".version"); if [ "$VERSION" != "latest-tmp" ]; then echo "Deleting old package ID: $ID (version: $VERSION)"; curl --request DELETE --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}"; fi; fi; done' \
            '      find built_packages -name "${PKG_NAME}-*" -type f | while read -r FILE; do FILENAME=$(basename "$FILE"); echo "Publishing $FILENAME to $PUBLISH_VERSION..."; curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "$FILE" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_ID_UPLOAD}/${PUBLISH_VERSION}/${FILENAME}"; done' \
            '      TMP_PACKAGE_IDS=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=${PKG_ID_UPLOAD}&package_version=latest-tmp&package_type=generic" | jq -r ".[].id")' \
            '      for ID in $TMP_PACKAGE_IDS; do if [ -n "$ID" ] && [ "$ID" != "null" ]; then curl --request DELETE --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}"; fi; done' \
            "  artifacts:" \
            "    paths:" \
            "      - built_packages/" \
            "    expire_in: 1 day" \
            "" >> generated/child.yml
        fi

        # ── macOS target ──
        if [ -z "$PLATFORMS" ] || echo "$PLATFORMS" | grep -q "macos\|ci:.*:macos"; then
          MACOS_TARGETS="macos-amd64 macos-arm64"
          if [ -n "$PLATFORMS" ]; then
            MACOS_TARGETS=""
            for PLATFORM in $PLATFORMS; do
              case "$PLATFORM" in
                ci:*) T="${PLATFORM#ci:}"; T="${T%%:*}"; R="${PLATFORM##*:}"
                      if [ "$R" = "macos" ]; then MACOS_TARGETS="$MACOS_TARGETS $T"; fi ;;
                macos|macos-*) MACOS_TARGETS="$MACOS_TARGETS $PLATFORM" ;;
              esac
            done
          fi
          if [ -n "$MACOS_TARGETS" ]; then
            printf '%s\n' \
              "build-macos-$PKG_ID:" \
              "  stage: build" \
              "  image: macos-26-xcode-26" \
              "  tags:" \
              "    - saas-macos-medium-m1" \
              "  variables:" \
              "    PKG_FILE: \"$PKG_FILE\"" \
              "    TARGETS: \"$MACOS_TARGETS\"" \
              "  before_script:" \
              "    - brew install jq gnupg" \
              "    - curl -fsSL https://zillowe.pages.dev/scripts/zoi/install.sh | bash" \
              '    - export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"' \
              "    - zoi sync" \
              '    - if [ -n "$GPG_PRIVATE_KEY" ]; then mkdir -p .gnupg; export GNUPGHOME="$(pwd)/.gnupg"; chmod 700 .gnupg; echo "allow-loopback-pinentry" > .gnupg/gpg-agent.conf; echo "pinentry-mode loopback" > .gnupg/gpg.conf; echo "$GPG_PRIVATE_KEY" | base32 -d | gpg --batch --pinentry-mode loopback --import; gpgconf --kill gpg-agent; GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep "^sec" | cut -d: -f5 | head -n 1); echo "$GPG_KEY_ID" > gpg_key_id.txt; fi' \
              "  script:" \
              "    - |" \
              '      mkdir -p built_packages' \
              '      GPG_KEY_ID=$(cat gpg_key_id.txt 2>/dev/null || echo "")' \
              '      SIGN_ARG=""; [ -n "$GPG_KEY_ID" ] && SIGN_ARG="--sign $GPG_KEY_ID"' \
              '      for TARGET in $TARGETS; do' \
              '        echo "Building $PKG_FILE for $TARGET..."' \
              '        zoi package build "$PKG_FILE" --install-deps --platform "$TARGET" --method native -o built_packages $SIGN_ARG' \
              '      done' \
              '      echo "Bundling .zsa for $PKG_FILE..."' \
              '      zoi package bundle "$PKG_FILE" -o built_packages' \
              '      PKG_JSON=$(zoi package inspect "$PKG_FILE" --json)' \
              '      PKG_NAME=$(echo "$PKG_JSON" | jq -r ".name")' \
              '      PKG_REPO=$(echo "$PKG_JSON" | jq -r ".repo")' \
              '      if [ -z "$PKG_REPO" ] || [ "$PKG_REPO" = "null" ]; then PKG_ID_UPLOAD="$PKG_NAME"; else PKG_ID_UPLOAD="$(echo "$PKG_REPO" | tr "/" ".").$PKG_NAME"; fi' \
              '      find built_packages -name "${PKG_NAME}-*" -type f | while read -r FILE; do FILENAME=$(basename "$FILE"); echo "Uploading $FILENAME to latest-tmp..."; curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "$FILE" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_ID_UPLOAD}/latest-tmp/${FILENAME}"; done' \
              '      PACKAGE_IDS=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=${PKG_ID_UPLOAD}&package_type=generic" | jq -r ".[].id")' \
              '      for ID in $PACKAGE_IDS; do if [ -n "$ID" ] && [ "$ID" != "null" ]; then VERSION=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}" | jq -r ".version"); if [ "$VERSION" != "latest-tmp" ]; then echo "Deleting old package ID: $ID (version: $VERSION)"; curl --request DELETE --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}"; fi; fi; done' \
              '      find built_packages -name "${PKG_NAME}-*" -type f | while read -r FILE; do FILENAME=$(basename "$FILE"); echo "Publishing $FILENAME to $PUBLISH_VERSION..."; curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "$FILE" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_ID_UPLOAD}/${PUBLISH_VERSION}/${FILENAME}"; done' \
              '      TMP_PACKAGE_IDS=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=${PKG_ID_UPLOAD}&package_version=latest-tmp&package_type=generic" | jq -r ".[].id")' \
              '      for ID in $TMP_PACKAGE_IDS; do if [ -n "$ID" ] && [ "$ID" != "null" ]; then curl --request DELETE --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}"; fi; done' \
              "  artifacts:" \
              "    paths:" \
              "      - built_packages/" \
              "    expire_in: 1 day" \
              "" >> generated/child.yml
          fi
        fi

        # ── Windows target ──
        if [ -z "$PLATFORMS" ] || echo "$PLATFORMS" | grep -q "windows\|ci:.*:windows"; then
          WIN_TARGETS="windows-amd64"
          if [ -n "$PLATFORMS" ]; then
            WIN_TARGETS=""
            for PLATFORM in $PLATFORMS; do
              case "$PLATFORM" in
                ci:*) T="${PLATFORM#ci:}"; T="${T%%:*}"; R="${PLATFORM##*:}"
                      if [ "$R" = "windows" ]; then WIN_TARGETS="$WIN_TARGETS $T"; fi ;;
                windows|windows-*) WIN_TARGETS="$WIN_TARGETS $PLATFORM" ;;
              esac
            done
          fi
          if [ -n "$WIN_TARGETS" ]; then
            printf '%s\n' \
              "build-windows-$PKG_ID:" \
              "  stage: build" \
              "  tags:" \
              "    - saas-windows-medium-amd64" \
              "  variables:" \
              "    PKG_FILE: \"$PKG_FILE\"" \
              "  before_script:" \
              '    - choco install jq -y' \
              '    - powershell -c "irm zillowe.pages.dev/scripts/zoi/install.ps1|iex"' \
              "    - zoi sync" \
              "  script:" \
              "    - |" \
              '      mkdir -p built_packages' \
              '      echo "Building $PKG_FILE for windows-amd64..."' \
              '      zoi package build "$PKG_FILE" --install-deps --platform windows-amd64 --method native -o built_packages' \
              '      echo "Bundling .zsa for $PKG_FILE..."' \
              '      zoi package bundle "$PKG_FILE" -o built_packages' \
              '      PKG_JSON=$(zoi package inspect "$PKG_FILE" --json)' \
              '      PKG_NAME=$(echo "$PKG_JSON" | jq -r ".name")' \
              '      PKG_REPO=$(echo "$PKG_JSON" | jq -r ".repo")' \
              '      if [ -z "$PKG_REPO" ] || [ "$PKG_REPO" = "null" ]; then PKG_ID_UPLOAD="$PKG_NAME"; else PKG_ID_UPLOAD="$(echo "$PKG_REPO" | tr "/" ".").$PKG_NAME"; fi' \
              '      find built_packages -name "${PKG_NAME}-*" -type f | while read -r FILE; do FILENAME=$(basename "$FILE"); echo "Uploading $FILENAME to latest-tmp..."; curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "$FILE" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_ID_UPLOAD}/latest-tmp/${FILENAME}"; done' \
              '      PACKAGE_IDS=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=${PKG_ID_UPLOAD}&package_type=generic" | jq -r ".[].id")' \
              '      for ID in $PACKAGE_IDS; do if [ -n "$ID" ] && [ "$ID" != "null" ]; then VERSION=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}" | jq -r ".version"); if [ "$VERSION" != "latest-tmp" ]; then echo "Deleting old package ID: $ID (version: $VERSION)"; curl --request DELETE --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}"; fi; fi; done' \
              '      find built_packages -name "${PKG_NAME}-*" -type f | while read -r FILE; do FILENAME=$(basename "$FILE"); echo "Publishing $FILENAME to $PUBLISH_VERSION..."; curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "$FILE" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_ID_UPLOAD}/${PUBLISH_VERSION}/${FILENAME}"; done' \
              '      TMP_PACKAGE_IDS=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=${PKG_ID_UPLOAD}&package_version=latest-tmp&package_type=generic" | jq -r ".[].id")' \
              '      for ID in $TMP_PACKAGE_IDS; do if [ -n "$ID" ] && [ "$ID" != "null" ]; then curl --request DELETE --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}"; fi; done' \
              "  artifacts:" \
              "    paths:" \
              "      - built_packages/" \
              "    expire_in: 1 day" \
              "" >> generated/child.yml
          fi
        fi
      done
      if [ "$(wc -l < generated/child.yml)" -le 8 ]; then
        printf '%s\n' \
          "noop:" \
          "  stage: build" \
          '  script: echo "No packages changed, nothing to build"' \
          "" >> generated/child.yml
      fi
  artifacts:
    paths:
      - generated/

trigger-child:
  stage: build
  needs:
    - generate-child
  trigger:
    include:
      - artifact: generated/child.yml
        job: generate-child
    strategy: depend
