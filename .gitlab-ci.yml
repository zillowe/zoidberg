stages:
  - security
  - publish

variables:
  PUBLISH_VERSION: "latest"

advisory-id-assignment:
  stage: security
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: "$CI_COMMIT_BRANCH && $CI_COMMIT_MESSAGE !~ /security: automatically assign ZSA IDs/"
  before_script:
    - apk add --no-cache jq yq git bash
  script:
    - |
      echo "Checking for temporary security advisories..."
      TEMP_FILES=$(find . -name "*TEMP.sec.yaml")
      if [ -z "$TEMP_FILES" ]; then
        echo "No temporary advisories found."
        exit 0
      fi

      if [ -n "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" ]; then
        TARGET_BRANCH=$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
      else
        TARGET_BRANCH=$CI_COMMIT_BRANCH
      fi

      git config --global user.email "ci-bot@zillowe.qzz.io"
      git config --global user.name "ZSA Registrar Bot"

      git remote set-url origin "https://oauth2:${PROJECT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git fetch origin $TARGET_BRANCH
      git checkout $TARGET_BRANCH

      ADVISORY_PREFIX=$(yq e '.advisory_prefix // "ZSA"' repo.yaml)
      CURRENT_YEAR=$(date +%Y)

      REG_YEAR=$(jq -r '.year' advisories.json)
      if [ "$REG_YEAR" != "$CURRENT_YEAR" ]; then
        echo "New year detected ($CURRENT_YEAR). Resetting counter."
        jq ".year = $CURRENT_YEAR | .last_id = 0" advisories.json > advisories.json.tmp && mv advisories.json.tmp advisories.json
      fi

      for FILE in $TEMP_FILES; do
        LAST_ID=$(jq -r '.last_id' advisories.json)
        NEXT_ID=$((LAST_ID + 1))
        ID_PADDING=$(printf "%04d" $NEXT_ID)
        
        SEVERITY=$(yq e '.severity' "$FILE" | tr '[:upper:]' '[:lower:]')
        case $SEVERITY in
          low) SEV_CHAR="A" ;;
          medium) SEV_CHAR="B" ;;
          high) SEV_CHAR="C" ;;
          critical) SEV_CHAR="D" ;;
          *) SEV_CHAR="A" ;;
        esac
        
        FINAL_ID="${ADVISORY_PREFIX}-${CURRENT_YEAR}-${SEV_CHAR}${ID_PADDING}"
        DIR=$(dirname "$FILE")
        FINAL_FILE="${DIR}/${FINAL_ID}.sec.yaml"
        
        echo "Assigning ID $FINAL_ID to $FILE"
        
        yq e -i ".id = \"$FINAL_ID\"" "$FILE"
        
        mv "$FILE" "$FINAL_FILE"
        
        PKG=$(yq e '.package' "$FINAL_FILE")
        jq ".last_id = $NEXT_ID | .advisories[\"$ID_PADDING\"] = \"$PKG\"" advisories.json > advisories.json.tmp && mv advisories.json.tmp advisories.json
        
        git add "$FINAL_FILE" "$FILE" advisories.json
      done

      git commit -m "security: automatically assign ZSA IDs [skip ci]"
      git push origin HEAD:$TARGET_BRANCH

publish-packages:
  stage: publish
  image: archlinux:latest
  services:
    - docker:dind
  variables:
    PUBLISH_VERSION: "latest"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  rules:
    - if: "$CI_COMMIT_MESSAGE =~ /pkgs: publish/"
  before_script:
    - pacman -Syu --noconfirm docker curl git bash gnupg zstd coreutils awk
    - curl -fsSL https://zillowe.pages.dev/scripts/zoi/install.sh | bash
    - export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
    - zoi sync
    - |
      if [ -n "$GPG_PRIVATE_KEY" ]; then
        echo "$GPG_PRIVATE_KEY" | base32 -d | gpg --import --batch
        GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d: -f5 | head -n 1)
        echo "Imported GPG Key: $GPG_KEY_ID"
      fi
    - |
      if [ -n "$GPG_PASSWORD" ]; then
        export GPG_PASSWORD=$(echo "$GPG_PASSWORD" | base32 -d)
      fi
  script:
    - mkdir -p built_packages
    - |
      find . -name "*.pkg.lua" -not -path "*/.*" | while read -r PKG_FILE; do
        echo "Processing package: $PKG_FILE"
        for PLATFORM in "linux-amd64" "linux-arm64" "windows-amd64" "macos-amd64" "macos-arm64"; do
          echo "Building for $PLATFORM..."
          SIGN_ARG=""
          if [ -n "${GPG_KEY_ID:-}" ]; then
            SIGN_ARG="--sign $GPG_KEY_ID"
          fi
          if ! zoi package build "$PKG_FILE" --platform "$PLATFORM" $SIGN_ARG -o built_packages --method docker --image archlinux --install-deps; then
            echo "Error: Failed to build $PKG_FILE for $PLATFORM"
            exit 1
          fi
        done
      done
    - |
      echo "Uploading all artifacts to GitLab Generic Package Registry..."
      find built_packages -type f | while read -r FILE; do
        FILENAME=$(basename "$FILE")
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$FILE" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoidberg/${PUBLISH_VERSION}/${FILENAME}"
      done
