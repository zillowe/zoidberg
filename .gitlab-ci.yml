stages:
  - publish

variables:
  PUBLISH_VERSION: "latest"

publish-packages:
  stage: publish
  image: archlinux:latest
  services:
    - docker:dind
  variables:
    PUBLISH_VERSION: "latest"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  rules:
    - if: "$CI_COMMIT_MESSAGE =~ /pkgs: publish/"
  before_script:
    - pacman -Syu --noconfirm docker curl git bash gnupg zstd coreutils awk
    - curl -fsSL https://zillowe.pages.dev/scripts/zoi/install.sh | bash
    - export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
    - zoi sync
    - |
      if [ -n "$GPG_PRIVATE_KEY" ]; then
        echo "$GPG_PRIVATE_KEY" | base32 -d | gpg --import --batch
        GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d: -f5 | head -n 1)
        echo "Imported GPG Key: $GPG_KEY_ID"
      fi
    - |
      if [ -n "$GPG_PASSWORD" ]; then
        export GPG_PASSWORD=$(echo "$GPG_PASSWORD" | base32 -d)
      fi
  script:
    - mkdir -p built_packages
    - |
      find . -name "*.pkg.lua" -not -path "*/.*" | while read -r PKG_FILE; do
        echo "Processing package: $PKG_FILE"
        for PLATFORM in "linux-amd64" "linux-arm64" "windows-amd64" "macos-amd64" "macos-arm64"; do
          echo "Building for $PLATFORM..."
          SIGN_ARG=""
          if [ -n "${GPG_KEY_ID:-}" ]; then
            SIGN_ARG="--sign $GPG_KEY_ID"
          fi
          if ! zoi package build "$PKG_FILE" --platform "$PLATFORM" $SIGN_ARG -o built_packages --method docker --image archlinux --install-deps; then
            echo "Error: Failed to build $PKG_FILE for $PLATFORM"
            exit 1
          fi
        done
      done
    - |
      echo "Uploading all artifacts to GitLab Generic Package Registry..."
      find built_packages -type f | while read -r FILE; do
        FILENAME=$(basename "$FILE")
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$FILE" \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zoidberg/${PUBLISH_VERSION}/${FILENAME}"
      done
