stages:
  - lint
  - metagen
  - generate
  - build
  - publish

variables:
  PUBLISH_VERSION: "latest"
  GIT_DEPTH: "0"

.gpg_setup: &gpg_setup
  - |
    if [ -n "$GPG_PRIVATE_KEY" ]; then
      mkdir -p .gnupg; export GNUPGHOME="$(pwd)/.gnupg"; chmod 700 .gnupg
      echo "$GPG_PRIVATE_KEY" | base32 -d | gpg --import --batch
      GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d: -f5 | head -n 1)
      echo "Imported GPG Key: $GPG_KEY_ID"
      echo "$GPG_KEY_ID" > gpg_key_id.txt
    fi

.common_before_script: &common_before_script
  - curl -fsSL https://zillowe.pages.dev/scripts/zoi/install.sh | bash
  - export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
  - zoi sync
  - *gpg_setup

.detect_changes: &detect_changes
  - |
    if [ "$CI_COMMIT_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
      CHANGED_FILES=$(find . -name "*.pkg.lua" -not -path "*/.*")
    else
      CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA | grep "\.pkg\.lua$" || true)
    fi
    echo "Changed packages: $CHANGED_FILES"

registry-audit:
  stage: lint
  image: archlinux:latest
  before_script:
    - pacman -Syu --noconfirm curl git bash gnupg coreutils
    - *common_before_script
  script:
    - zoi reg check

metadata-generation:
  stage: metagen
  image: archlinux:latest
  rules:
    - if: "$CI_COMMIT_MESSAGE !~ /security: update metadata index/"
  before_script:
    - pacman -Syu --noconfirm curl git bash gnupg coreutils
    - *common_before_script
  script:
    - |
      if [ -n "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME" ]; then
        TARGET_BRANCH=$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
      else
        TARGET_BRANCH=$CI_COMMIT_BRANCH
      fi
      git config --global user.email "contact@zillowe.qzz.io"
      git config --global user.name "ZSA Registrar Bot"
      if [ -n "$GPG_PRIVATE_KEY" ]; then
        mkdir -p ~/.gnupg; chmod 700 ~/.gnupg
        echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
        echo "$GPG_PRIVATE_KEY" | base32 -d | gpg --batch --import
        gpgconf --kill gpg-agent
        GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d: -f5 | head -n 1)
        if [ -n "$GPG_KEY_ID" ]; then git config --global user.signingkey "$GPG_KEY_ID"; fi
        if [ -n "$GPG_PASSWORD" ]; then
          GPG_PASS=$(echo "$GPG_PASSWORD" | base32 -d); export GPG_PASS
          printf '#!/bin/sh\nexec gpg --batch --passphrase "$GPG_PASS" --pinentry-mode loopback "$@"\n' > /tmp/git-gpg-wrapper
          chmod +x /tmp/git-gpg-wrapper
          git config --global gpg.program /tmp/git-gpg-wrapper
        fi
      fi
      git remote set-url origin "https://oauth2:${PROJECT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git fetch origin refs/heads/$TARGET_BRANCH
      git checkout -B $TARGET_BRANCH origin/$TARGET_BRANCH
      zoi reg gen-meta
      if [ -n "$(git status --porcelain)" ]; then
        git add .
        git commit -S -m "security: update metadata index [skip ci]"
        git push origin HEAD:$TARGET_BRANCH
      fi

# ── Linux: single job, Docker-isolated per-package builds ──

build-linux:
  stage: build
  image: archlinux:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
    RUNNER_OS: "linux"
    DEFAULT_TARGETS: "linux-amd64 linux-arm64"
  tags:
    - saas-linux-small-amd64
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - pacman -Syu --noconfirm docker curl git bash gnupg zstd coreutils awk jq
    - *common_before_script
  script:
    - *detect_changes
    - |
      if [ -z "$CHANGED_FILES" ]; then
        mkdir -p built_packages
        exit 0
      fi
      mkdir -p built_packages
      export GPG_KEY_ID=$(cat gpg_key_id.txt 2>/dev/null || echo "")
      for PKG_FILE in $CHANGED_FILES; do
        if [ ! -f "$PKG_FILE" ]; then continue; fi
        PKG_JSON=$(zoi package inspect "$PKG_FILE" --json)
        PLATFORMS=$(echo "$PKG_JSON" | jq -r '.platforms // [] | .[]')
        TARGETS=""
        if [ -z "$PLATFORMS" ]; then
          TARGETS="$DEFAULT_TARGETS"
        else
          for PLATFORM in $PLATFORMS; do
            case "$PLATFORM" in
              ci:*) T="${PLATFORM#ci:}"; T="${T%%:*}"; R="${PLATFORM##*:}"
                    if [ "$R" = "linux" ]; then TARGETS="$TARGETS $T"; fi ;;
              linux|linux-*) TARGETS="$TARGETS $PLATFORM" ;;
            esac
          done
        fi
        for TARGET in $TARGETS; do
          # SIGN_ARG=""; [ -n "$GPG_KEY_ID" ] && SIGN_ARG="--sign $GPG_KEY_ID"
          echo "Building $PKG_FILE for $TARGET..."
          zoi package build "$PKG_FILE" --platform "$TARGET" $SIGN_ARG -o built_packages --method docker --image archlinux --install-deps --fakeroot
        done
      done
  artifacts:
    paths:
      - built_packages/
    expire_in: 1 day

# ── macOS & Windows: generate child pipeline (one job per package) ──

generate-native-child:
  stage: generate
  image: archlinux:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - pacman -Syu --noconfirm curl git bash coreutils awk jq
    - *common_before_script
  script:
    - *detect_changes
    - |
      if [ -z "$CHANGED_FILES" ]; then
        echo "No packages changed."
        mkdir -p generated built_packages
        printf '%s\n' \
          "stages:" \
          "  - build" \
          "" \
          "noop:" \
          "  stage: build" \
          '  script: echo "No packages changed, nothing to build"' \
          "" > generated/child.yml
        exit 0
      fi

      mkdir -p generated built_packages

      # Write child pipeline header
      printf '%s\n' \
        "stages:" \
        "  - build" \
        "" \
        "variables:" \
        '  PUBLISH_VERSION: "latest"' \
        "  GIT_DEPTH: \"0\"" \
        "" > generated/child.yml

      for PKG_FILE in $CHANGED_FILES; do
        if [ ! -f "$PKG_FILE" ]; then continue; fi

        PKG_JSON=$(zoi package inspect "$PKG_FILE" --json)
        PLATFORMS=$(echo "$PKG_JSON" | jq -r '.platforms // [] | .[]')
        PKG_BASENAME=$(basename "$PKG_FILE" .pkg.lua)
        PKG_ID=$(echo "$PKG_FILE" | tr '/' '-' | sed 's/\.pkg\.lua$//')
        ESCAPED_FILE=$(echo "$PKG_FILE" | sed 's/\./\\./g; s/\//\\\//g')

        # macOS target
        if [ -z "$PLATFORMS" ] || echo "$PLATFORMS" | grep -q "macos\|ci:.*:macos"; then
          MACOS_TARGETS="macos-amd64 macos-arm64"
          if [ -n "$PLATFORMS" ]; then
            MACOS_TARGETS=""
            for PLATFORM in $PLATFORMS; do
              case "$PLATFORM" in
                ci:*) T="${PLATFORM#ci:}"; T="${T%%:*}"; R="${PLATFORM##*:}"
                      if [ "$R" = "macos" ]; then MACOS_TARGETS="$MACOS_TARGETS $T"; fi ;;
                macos|macos-*) MACOS_TARGETS="$MACOS_TARGETS $PLATFORM" ;;
              esac
            done
          fi
          if [ -n "$MACOS_TARGETS" ]; then
            printf '%s\n' \
              "build-macos-$PKG_ID:" \
              "  stage: build" \
              "  image: macos-26-xcode-26" \
              "  tags:" \
              "    - saas-macos-medium-m1" \
              "  variables:" \
              "    PKG_FILE: \"$PKG_FILE\"" \
              "    TARGETS: \"$MACOS_TARGETS\"" \
              "  before_script:" \
              "    - brew install jq" \
              "    - curl -fsSL https://zillowe.pages.dev/scripts/zoi/install.sh | bash" \
              '    - export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"' \
              "    - zoi sync" \
              "  script:" \
              "    - |" \
              '      mkdir -p built_packages' \
              '      for TARGET in $TARGETS; do' \
              '        echo "Building $PKG_FILE for $TARGET..."' \
              '        zoi package build "$PKG_FILE" --install-deps --platform "$TARGET" --method native -o built_packages' \
              "      done" \
              "  artifacts:" \
              "    paths:" \
              "      - built_packages/" \
              "    expire_in: 1 day" \
              "" >> generated/child.yml
          fi
        fi

        # Windows target
        if [ -z "$PLATFORMS" ] || echo "$PLATFORMS" | grep -q "windows\|ci:.*:windows"; then
          WIN_TARGETS="windows-amd64"
          if [ -n "$PLATFORMS" ]; then
            WIN_TARGETS=""
            for PLATFORM in $PLATFORMS; do
              case "$PLATFORM" in
                ci:*) T="${PLATFORM#ci:}"; T="${T%%:*}"; R="${PLATFORM##*:}"
                      if [ "$R" = "windows" ]; then WIN_TARGETS="$WIN_TARGETS $T"; fi ;;
                windows|windows-*) WIN_TARGETS="$WIN_TARGETS $PLATFORM" ;;
              esac
            done
          fi
          if [ -n "$WIN_TARGETS" ]; then
            printf '%s\n' \
              "build-windows-$PKG_ID:" \
              "  stage: build" \
              "  tags:" \
              "    - saas-windows-medium-amd64" \
              "  variables:" \
              "    PKG_FILE: \"$PKG_FILE\"" \
              "  before_script:" \
              '    - choco install jq -y' \
              '    - powershell -c "irm zillowe.pages.dev/scripts/zoi/install.ps1|iex"' \
              "    - zoi sync" \
              "  script:" \
              "    - |" \
              '      mkdir -p built_packages' \
              '      echo "Building $PKG_FILE for windows-amd64..."' \
              '      zoi package build "$PKG_FILE" --install-deps --platform windows-amd64 --method native -o built_packages' \
              "  artifacts:" \
              "    paths:" \
              "      - built_packages/" \
              "    expire_in: 1 day" \
              "" >> generated/child.yml
          fi
        fi
      done
      if [ "$(wc -l < generated/child.yml)" -le 8 ]; then
        printf '%s\n' \
          "noop:" \
          "  stage: build" \
          '  script: echo "No packages changed, nothing to build"' \
          "" >> generated/child.yml
      fi
  artifacts:
    paths:
      - generated/
      - built_packages/

trigger-macos-windows:
  stage: build
  needs:
    - generate-native-child
  trigger:
    include:
      - artifact: generated/child.yml
        job: generate-native-child
    strategy: depend

# ── Upload ──

upload-packages:
  stage: publish
  image: archlinux:latest
  needs:
    - build-linux
    - trigger-macos-windows
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - pacman -Syu --noconfirm curl git bash coreutils jq
    - curl -fsSL https://zillowe.pages.dev/scripts/zoi/install.sh | bash
    - export PATH="$HOME/.local/bin:/usr/local/bin:$PATH"
  script:
    - |
      ALL_BUILT=$(find built_packages -name "*.zpa" -o -name "*.zsa" 2>/dev/null || true)
      if [ -z "$ALL_BUILT" ]; then
        echo "No built packages found. Checking for changed packages..."
        if [ "$CI_COMMIT_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
          CHANGED_FILES=$(find . -name "*.pkg.lua" -not -path "*/.*")
        else
          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r $CI_COMMIT_BEFORE_SHA $CI_COMMIT_SHA | grep "\.pkg\.lua$" || true)
        fi
        if [ -z "$CHANGED_FILES" ]; then echo "No packages changed."; exit 0; fi
      fi

      for PKG_FILE in $CHANGED_FILES; do
        if [ ! -f "$PKG_FILE" ]; then
          PKG_NAME=$(basename "$PKG_FILE" .pkg.lua)
          PKG_REPO=$(echo "$PKG_FILE" | sed -E 's|^\./||' | rev | cut -d'/' -f3- | rev)
        else
          echo "Processing package: $PKG_FILE"
          PKG_JSON=$(zoi package inspect "$PKG_FILE" --json)
          PKG_NAME=$(echo "$PKG_JSON" | jq -r '.name')
          PKG_REPO=$(echo "$PKG_JSON" | jq -r '.repo')
          # Bundle and sign .zsa for this package
          GPG_KEY_ID=$(cat gpg_key_id.txt 2>/dev/null || echo "")
          SIGN_BUNDLE_ARG=""
          # [ -n "$GPG_KEY_ID" ] && SIGN_BUNDLE_ARG="--sign $GPG_KEY_ID"
          echo "Bundling .zsa for $PKG_FILE..."
          zoi package bundle "$PKG_FILE" -o built_packages $SIGN_BUNDLE_ARG
        fi

        if [ -z "$PKG_REPO" ] || [ "$PKG_REPO" = "null" ]; then
          PKG_ID="$PKG_NAME"
        else
          PKG_ID="$(echo "$PKG_REPO" | tr '/' '.').$PKG_NAME"
        fi

        echo "Uploading to temporary version (latest-tmp) for atomic replacement..."
        find built_packages -name "${PKG_NAME}-*" -type f | while read -r FILE; do
          FILENAME=$(basename "$FILE")
          echo "Uploading $FILENAME to latest-tmp..."
          curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$FILE" \
               "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_ID}/latest-tmp/${FILENAME}"
        done

        echo "Cleaning old versions..."
        PACKAGE_IDS=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=${PKG_ID}&package_type=generic" | jq -r '.[].id')
        for ID in $PACKAGE_IDS; do
          if [ -n "$ID" ] && [ "$ID" != "null" ]; then
            VERSION=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}" | jq -r '.version')
            if [ "$VERSION" != "latest-tmp" ]; then
              echo "Deleting old package ID: $ID (version: $VERSION)"
              curl --request DELETE --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}"
            fi
          fi
        done

        if [ -f "$PKG_FILE" ]; then
          find built_packages -name "${PKG_NAME}-*" -type f | while read -r FILE; do
            FILENAME=$(basename "$FILE")
            echo "Publishing $FILENAME to $PUBLISH_VERSION..."
            curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
                 --upload-file "$FILE" \
                 "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PKG_ID}/${PUBLISH_VERSION}/${FILENAME}"
          done
        fi

        echo "Cleaning up latest-tmp..."
        TMP_PACKAGE_IDS=$(curl --silent --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_name=${PKG_ID}&package_version=latest-tmp&package_type=generic" | jq -r '.[].id')
        for ID in $TMP_PACKAGE_IDS; do
          if [ -n "$ID" ] && [ "$ID" != "null" ]; then
            curl --request DELETE --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/${ID}"
          fi
        done
      done
